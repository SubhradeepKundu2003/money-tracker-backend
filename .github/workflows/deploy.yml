name: CI / Deploy to EC2

# Build + test on every push and PR. Deploy only when the default branch
# advances (push to main/master), never on a pull request.
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and test
        run: ./mvnw -B clean package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 5

  deploy:
    name: Deploy to EC2
    needs: build-test
    # Only deploy on a real push to the default branch — skip for PRs.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: ec2-deploy
      cancel-in-progress: false
    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Select the executable jar
        run: |
          JAR="$(ls target/*.jar | grep -v -- '-plain' | head -n1)"
          echo "Using $JAR"
          cp "$JAR" app.jar

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload jar to server
        run: |
          scp -i ~/.ssh/deploy_key app.jar \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/app.jar"

      - name: Install and restart service
        run: |
          ssh -i ~/.ssh/deploy_key \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            'sudo install -o moneytracker -g moneytracker -m 644 /tmp/app.jar /opt/money-tracker/app.jar \
             && sudo systemctl restart money-tracker \
             && sleep 5 \
             && sudo systemctl is-active money-tracker'

      - name: Smoke test
        run: |
          for i in 1 2 3 4 5 6; do
            CODE=$(curl -s --max-time 15 -o /dev/null -w "%{http_code}" \
              "https://money-tracker1.duckdns.org/v3/api-docs" || true)
            echo "attempt $i -> HTTP $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 10
          done
          echo "Service did not return 200 after restart" >&2
          exit 1

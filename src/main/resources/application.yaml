spring:
  application:
    name: money-tracker-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8099}

# Application-specific security configuration
app:
  security:
    # 256-bit secret used to sign internal JWTs. Override in every real environment.
    jwt-secret: ${APP_JWT_SECRET:dev-only-change-me-please-32-bytes-minimum-secret-key}
    # Lifetime of the short-lived access/session token, in minutes.
    session-ttl-minutes: ${APP_SESSION_TTL_MINUTES:60}
    # Absolute lifetime of a refresh-token family, in days. Rotation keeps this cap.
    refresh-ttl-days: ${APP_REFRESH_TTL_DAYS:30}
    issuer: money-tracker
  cors:
    # Comma-separated list of allowed origins for the mobile/web client.
    allowed-origins: ${APP_CORS_ORIGINS:*}
  fx:
    # Foreign-exchange rate provider (frankfurter — free, no API key).
    base-url: ${APP_FX_BASE_URL:https://api.frankfurter.dev/v1}
    # How long fetched rates/currency list are cached, in minutes.
    cache-ttl-minutes: ${APP_FX_CACHE_TTL_MINUTES:360}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  api-docs:
    path: /v3/api-docs

logging:
  level:
    org.hibernate.SQL: ${SQL_LOG_LEVEL:info}
